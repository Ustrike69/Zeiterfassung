name: Docker Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ustrike69/zeiterfassung

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Hauptrepo
        uses: actions/checkout@v4

      - name: Hole Dockerfile + entrypoint aus Deploy-Repo
        run: |
          mkdir -p docker
          curl -sL https://raw.githubusercontent.com/Ustrike69/Zeiterfassung-Deploy/main/docker/Dockerfile -o Dockerfile
          curl -sL https://raw.githubusercontent.com/Ustrike69/Zeiterfassung-Deploy/main/docker/entrypoint.sh -o docker/entrypoint.sh
          chmod +x docker/entrypoint.sh

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
